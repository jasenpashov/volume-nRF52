[env:adafruit_feather_nrf52840]
platform = nordicnrf52
board = adafruit_feather_nrf52840
framework = arduino
build_flags = 
    -DNRF52_PAN_74
    -DCFG_DEBUG=0
monitor_speed = 115200

lib_deps =  
  https://github.com/adafruit/Adafruit_nRF52_Arduino